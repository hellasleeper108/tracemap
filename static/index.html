<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Network Trace Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  background: #0d1117;
  color: #c9d1d9;
  display: flex;
  height: 100vh;
  overflow: hidden;
}
#map { flex: 1; }
#sidebar {
  width: 300px;
  background: #161b22;
  border-left: 1px solid #30363d;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}

/* ── Header ── */
#header {
  padding: 14px 16px 12px;
  border-bottom: 1px solid #30363d;
  flex-shrink: 0;
}
#header h1 {
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: #58a6ff;
  margin-bottom: 4px;
}
#stats { font-size: 11px; color: #8b949e; }

/* ── Host info ── */
#host-info {
  padding: 10px 16px;
  border-bottom: 1px solid #30363d;
  font-size: 11px;
  color: #8b949e;
  flex-shrink: 0;
}
#host-info .label { color: #3fb950; font-weight: bold; }

/* ── Filter bar ── */
#filter-bar {
  padding: 8px 12px;
  border-bottom: 1px solid #30363d;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
#search-wrap {
  position: relative;
  display: flex;
  align-items: center;
}
#search-input {
  width: 100%;
  background: #0d1117;
  border: 1px solid #30363d;
  border-radius: 4px;
  color: #c9d1d9;
  font-family: inherit;
  font-size: 11px;
  padding: 5px 22px 5px 8px;
  outline: none;
  transition: border-color 0.15s;
}
#search-input:focus { border-color: #388bfd; }
#search-input::placeholder { color: #3d444d; }
#clear-btn {
  position: absolute;
  right: 6px;
  background: none;
  border: none;
  color: #484f58;
  cursor: pointer;
  font-size: 14px;
  padding: 0;
  line-height: 1;
  display: none;
}
#clear-btn:hover { color: #8b949e; }
#chips { display: flex; flex-wrap: wrap; gap: 4px; }
.chip {
  font-size: 10px;
  padding: 2px 7px;
  border-radius: 3px;
  border: 1px solid #30363d;
  color: #6e7681;
  background: #0d1117;
  cursor: pointer;
  transition: border-color 0.12s, color 0.12s, background 0.12s;
  user-select: none;
  white-space: nowrap;
}
.chip:hover { border-color: #8b949e; color: #c9d1d9; }
.threat-chip        { border-color: rgba(240,136,62,0.5); color: #f0883e; background: rgba(240,136,62,0.05); }
.threat-chip.active { background: rgba(240,136,62,0.15); border-color: #f0883e; }
.threat-chip:hover  { border-color: #f0883e; }

/* ── Connection list ── */
#conn-list { flex: 1; overflow-y: auto; }
.conn {
  padding: 9px 16px 9px 14px;
  border-bottom: 1px solid #1c2128;
  cursor: pointer;
  transition: background 0.15s;
  display: flex;
  align-items: flex-start;
  gap: 6px;
}
.conn:hover { background: #1c2128; }
.conn.threat-high { border-left: 2px solid #f85149; }
.conn.threat-med  { border-left: 2px solid #f0883e; }
.conn.threat-low  { border-left: 2px solid #e3b341; }
.conn-body { flex: 1; min-width: 0; }
.conn .ip   { font-size: 12px; font-weight: bold; }
.conn .loc  { font-size: 11px; color: #8b949e; margin-top: 2px; }
.conn .proc { font-size: 10px; color: #3fb950; margin-top: 2px; }
.conn .org  { font-size: 10px; color: #d2a8ff; margin-top: 1px;
              white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.conn .threat-badge {
  display: inline-block;
  font-size: 10px;
  margin-top: 3px;
  padding: 1px 5px;
  border-radius: 3px;
  font-weight: bold;
}
.badge-high { background: rgba(248,81,73,0.15);  color: #f85149; }
.badge-med  { background: rgba(240,136,62,0.15); color: #f0883e; }
.badge-low  { background: rgba(227,179,65,0.15); color: #e3b341; }
.history-btn {
  flex-shrink: 0;
  background: none;
  border: none;
  color: #3d444d;
  cursor: pointer;
  font-size: 12px;
  padding: 2px 0;
  line-height: 1;
  transition: color 0.12s;
  margin-top: 1px;
}
.history-btn:hover { color: #58a6ff; }

#no-matches {
  padding: 32px 16px;
  text-align: center;
  color: #3d444d;
  font-size: 11px;
  letter-spacing: 0.05em;
}

/* ── Trace status bar ── */
#trace-status {
  padding: 7px 12px;
  border-top: 1px solid #30363d;
  font-size: 10px;
  color: #8b949e;
  flex-shrink: 0;
  display: none;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
#trace-status.visible { display: flex; }
#trace-status .trace-msg { flex: 1; }
#clear-trace-btn {
  background: none;
  border: 1px solid #30363d;
  border-radius: 3px;
  color: #6e7681;
  cursor: pointer;
  font-size: 10px;
  font-family: inherit;
  padding: 1px 6px;
}
#clear-trace-btn:hover { color: #c9d1d9; border-color: #8b949e; }

/* ── History panel ── */
#history-panel {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  background: #0d1117;
  border-top: 1px solid #30363d;
  transform: translateY(100%);
  transition: transform 0.2s ease;
  z-index: 10;
  display: flex;
  flex-direction: column;
}
#history-panel.open { transform: translateY(0); }
#history-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px 8px;
  border-bottom: 1px solid #21262d;
  flex-shrink: 0;
}
#history-ip {
  font-size: 12px;
  font-weight: bold;
  color: #79c0ff;
}
#history-meta {
  font-size: 10px;
  color: #8b949e;
  margin-top: 1px;
}
#history-close {
  background: none;
  border: none;
  color: #484f58;
  cursor: pointer;
  font-size: 16px;
  padding: 0;
  line-height: 1;
}
#history-close:hover { color: #c9d1d9; }
#history-chart-wrap { padding: 10px 14px 6px; flex-shrink: 0; }
#history-canvas { width: 100%; height: 56px; display: block; }
#history-footer {
  padding: 6px 14px 12px;
  font-size: 10px;
  color: #484f58;
}

/* ── Threat legend ── */
#threat-legend {
  padding: 8px 16px;
  border-top: 1px solid #30363d;
  font-size: 10px;
  color: #484f58;
  flex-shrink: 0;
  display: none;
}
#threat-legend.visible { display: block; }
#threat-legend .row { display: flex; align-items: center; gap: 6px; margin-bottom: 2px; }
#threat-legend .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* ── Footer ── */
#footer {
  padding: 8px 16px;
  border-top: 1px solid #30363d;
  font-size: 10px;
  color: #484f58;
  flex-shrink: 0;
}
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #30363d; border-radius: 2px; }

/* ── Leaflet dark theme ── */
.leaflet-popup-content-wrapper {
  background: #161b22;
  color: #c9d1d9;
  border: 1px solid #30363d;
  border-radius: 6px;
  font-family: inherit;
  font-size: 12px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.6);
}
.leaflet-popup-tip { background: #161b22; }
.leaflet-popup-content b { color: #58a6ff; }
.leaflet-popup-close-button { color: #8b949e !important; }
.trace-btn {
  margin-top: 8px;
  display: block;
  width: 100%;
  background: none;
  border: 1px solid #30363d;
  border-radius: 3px;
  color: #8b949e;
  cursor: pointer;
  font-family: inherit;
  font-size: 11px;
  padding: 4px 8px;
  text-align: center;
  transition: border-color 0.12s, color 0.12s;
}
.trace-btn:hover { border-color: #58a6ff; color: #58a6ff; }
</style>
</head>
<body>
<div id="map"></div>
<div id="sidebar">
  <div id="header">
    <h1>Network Trace Map</h1>
    <div id="stats">Connecting&hellip;</div>
  </div>
  <div id="host-info"><span class="label">HOST</span> &mdash; loading&hellip;</div>

  <div id="filter-bar">
    <div id="search-wrap">
      <input id="search-input" type="text" placeholder="search ip, city, org, process…" autocomplete="off" spellcheck="false">
      <button id="clear-btn" title="Clear filters">&times;</button>
    </div>
    <div id="chips"></div>
  </div>

  <div id="conn-list"></div>

  <div id="trace-status">
    <span class="trace-msg" id="trace-msg"></span>
    <button id="clear-trace-btn">clear trace</button>
  </div>

  <div id="threat-legend">
    <div class="row"><div class="dot" style="background:#f85149;box-shadow:0 0 4px #f85149"></div> Malicious (score &ge;75)</div>
    <div class="row"><div class="dot" style="background:#f0883e"></div> Suspicious (score 25&ndash;74)</div>
    <div class="row"><div class="dot" style="background:#e3b341"></div> Low risk (score 1&ndash;24)</div>
  </div>
  <div id="footer">Refreshes every 5s &bull; ip-api.com &bull; abuseipdb.com</div>

  <!-- History panel (slides up from bottom) -->
  <div id="history-panel">
    <div id="history-header">
      <div>
        <div id="history-ip"></div>
        <div id="history-meta"></div>
      </div>
      <button id="history-close">&times;</button>
    </div>
    <div id="history-chart-wrap">
      <canvas id="history-canvas"></canvas>
    </div>
    <div id="history-footer" id="history-summary"></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const map = L.map('map', { center: [20, 0], zoom: 2, zoomControl: true, attributionControl: false });
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 }).addTo(map);

// ── Icon builders ─────────────────────────────────────────────────────────────

const hostIcon = L.divIcon({
  className: '',
  html: '<div style="width:14px;height:14px;background:#3fb950;border:2px solid #fff;border-radius:50%;box-shadow:0 0 8px #3fb950;"></div>',
  iconSize: [14, 14], iconAnchor: [7, 7]
});

function peerIcon(color, lvl) {
  let shadow = `box-shadow:0 0 6px ${color};`;
  if (lvl === 'high') shadow = 'box-shadow:0 0 0 4px rgba(248,81,73,0.25),0 0 10px #f85149;';
  else if (lvl === 'med') shadow = 'box-shadow:0 0 0 3px rgba(240,136,62,0.2),0 0 8px #f0883e;';
  return L.divIcon({
    className: '',
    html: `<div style="width:10px;height:10px;background:${color};border:1px solid rgba(255,255,255,0.4);border-radius:50%;${shadow}"></div>`,
    iconSize: [10, 10], iconAnchor: [5, 5]
  });
}

// ── Threat helpers ────────────────────────────────────────────────────────────

function threatLevel(score) {
  if (score == null) return null;
  if (score >= 75) return 'high';
  if (score >= 25) return 'med';
  if (score >= 1)  return 'low';
  return null;
}

function threatLabel(score, reports) {
  const lvl = threatLevel(score);
  if (!lvl) return '';
  const icons  = { high: '☠', med: '⚠', low: '⚠' };
  const labels = { high: 'Malicious', med: 'Suspicious', low: 'Low risk' };
  return `<span class="threat-badge badge-${lvl}">${icons[lvl]} ${labels[lvl]} · score ${score} · ${reports} report${reports !== 1 ? 's' : ''}</span>`;
}

function markerColor(proc, score) {
  const lvl = threatLevel(score);
  if (lvl === 'high') return '#f85149';
  if (lvl === 'med')  return '#f0883e';
  return procColor(proc);
}

function hexToRgba(hex, a) {
  const n = parseInt(hex.slice(1), 16);
  return `rgba(${n>>16},${(n>>8)&255},${n&255},${a})`;
}

// ── Process colors ────────────────────────────────────────────────────────────

const procColors = {};
const palette = ['#79c0ff','#56d364','#d2a8ff','#ffa657','#39d353','#58a6ff'];
let colorIdx = 0;
function procColor(proc) {
  if (!proc) return '#6e7681';
  if (!procColors[proc]) procColors[proc] = palette[colorIdx++ % palette.length];
  return procColors[proc];
}

// ── Filter state ──────────────────────────────────────────────────────────────

let searchText  = '';
let activeProcs = new Set();
let threatOnly  = false;
let lastData    = null;

function matchesFilter(c) {
  if (searchText) {
    const q = searchText.toLowerCase();
    const hay = [c.ip, c.city, c.country, c.countryCode, c.org, c.isp, c.process]
      .filter(Boolean).join(' ').toLowerCase();
    if (!hay.includes(q)) return false;
  }
  if (activeProcs.size > 0 && !activeProcs.has(c.process || '')) return false;
  if (threatOnly && !(c.abuse_score > 0)) return false;
  return true;
}

function updateClearBtn() {
  const on = searchText !== '' || activeProcs.size > 0 || threatOnly;
  document.getElementById('clear-btn').style.display = on ? 'block' : 'none';
}

function clearAll() {
  searchText = '';
  activeProcs.clear();
  threatOnly = false;
  document.getElementById('search-input').value = '';
  updateClearBtn();
  if (lastData) { renderChips(lastData.connections, lastData.threat_enabled); applyFilter(lastData.connections); }
}

function renderChips(connections, threatEnabled) {
  const container = document.getElementById('chips');
  const procs = [...new Set(connections.map(c => c.process).filter(Boolean))].sort();
  const hasThreats = threatEnabled && connections.some(c => c.abuse_score > 0);
  container.innerHTML = '';
  procs.forEach(proc => {
    const color  = procColors[proc] || '#6e7681';
    const active = activeProcs.has(proc);
    const chip   = document.createElement('span');
    chip.className = 'chip' + (active ? ' active' : '');
    chip.textContent = proc;
    if (active) { chip.style.borderColor = color; chip.style.color = color; chip.style.background = hexToRgba(color, 0.12); }
    chip.onclick = () => {
      if (activeProcs.has(proc)) activeProcs.delete(proc); else activeProcs.add(proc);
      updateClearBtn();
      if (lastData) { renderChips(lastData.connections, lastData.threat_enabled); applyFilter(lastData.connections); }
    };
    container.appendChild(chip);
  });
  if (hasThreats) {
    const chip = document.createElement('span');
    chip.className = 'chip threat-chip' + (threatOnly ? ' active' : '');
    chip.textContent = '⚠ threats';
    chip.onclick = () => {
      threatOnly = !threatOnly;
      updateClearBtn();
      if (lastData) { renderChips(lastData.connections, lastData.threat_enabled); applyFilter(lastData.connections); }
    };
    container.appendChild(chip);
  }
}

function applyFilter(connections) {
  const ipMatched = {};
  let matchCount  = 0;
  connections.forEach(c => {
    const m = matchesFilter(c);
    if (m) { matchCount++; ipMatched[c.ip] = true; }
    else if (ipMatched[c.ip] === undefined) ipMatched[c.ip] = false;
    const row = rowMap[c.ip + ':' + c.port];
    if (row) row.style.display = m ? '' : 'none';
  });
  Object.entries(ipMatched).forEach(([ip, matched]) => {
    if (peerMarkers[ip]) peerMarkers[ip].setOpacity(matched ? 1 : 0.08);
    if (arcMap[ip]) {
      const { line, c } = arcMap[ip];
      const lvl = threatLevel(c.abuse_score);
      arcMap[ip].line.setStyle({ opacity: matched ? (lvl === 'high' ? 0.7 : 0.45) : 0.04 });
    }
  });
  const list = document.getElementById('conn-list');
  const existing = document.getElementById('no-matches');
  if (existing) existing.remove();
  if (matchCount === 0 && connections.length > 0) {
    const msg = document.createElement('div');
    msg.id = 'no-matches';
    msg.textContent = 'no connections match';
    list.appendChild(msg);
  }
}

// ── Map state ─────────────────────────────────────────────────────────────────

let hostMarker = null, hostLatLng = null;
let peerMarkers = {};
let arcMap  = {};   // ip → { line, c }
let rowMap  = {};   // "ip:port" → DOM row

// ── Arc drawing ───────────────────────────────────────────────────────────────

function gcArc(from, to, steps=60) {
  const pts   = [];
  const dist  = Math.hypot(to[0]-from[0], to[1]-from[1]);
  const bulge = Math.min(dist * 0.25, 30);
  for (let i = 0; i <= steps; i++) {
    const t = i / steps;
    pts.push([from[0]+(to[0]-from[0])*t + bulge*Math.sin(Math.PI*t), from[1]+(to[1]-from[1])*t]);
  }
  return pts;
}

// ── Traceroute ────────────────────────────────────────────────────────────────

let traceLayer  = { markers: [], lines: [] };
let tracePollId = null;

function clearTrace() {
  traceLayer.markers.forEach(m => map.removeLayer(m));
  traceLayer.lines.forEach(l => map.removeLayer(l));
  traceLayer = { markers: [], lines: [] };
  if (tracePollId) { clearInterval(tracePollId); tracePollId = null; }
  document.getElementById('trace-status').classList.remove('visible');
}

function drawTrace(ip, hops) {
  clearTrace();
  const pts = [];
  if (hostLatLng) pts.push(hostLatLng);

  hops.forEach(h => {
    if (!h.ip || h.lat == null || h.lon == null) return;
    const latlng = [h.lat, h.lon];
    pts.push(latlng);
    const m = L.circleMarker(latlng, {
      radius: 4, fillColor: '#6e7681', color: '#6e7681',
      weight: 1, fillOpacity: 0.9, opacity: 0.9
    }).addTo(map)
      .bindPopup(`<b>Hop ${h.hop}</b><br>${h.ip}<br>${h.city || ''} ${h.country || ''}<br>${h.rtt_ms != null ? h.rtt_ms + ' ms' : '* * *'}`);
    traceLayer.markers.push(m);
  });

  if (pts.length > 1) {
    const line = L.polyline(pts, { color: '#6e7681', weight: 1, opacity: 0.6, dashArray: '3,4' }).addTo(map);
    traceLayer.lines.push(line);
  }

  const validHops = hops.filter(h => h.ip);
  document.getElementById('trace-msg').textContent =
    `trace: ${ip} · ${validHops.length} hops`;
  document.getElementById('trace-status').classList.add('visible');
}

function pollTrace(ip) {
  tracePollId = setInterval(async () => {
    const r    = await fetch(`/api/traceroute/${ip}`);
    const data = await r.json();
    if (data.status === 'running') return;
    clearInterval(tracePollId);
    tracePollId = null;
    if (data.hops) drawTrace(ip, data.hops);
    else {
      document.getElementById('trace-msg').textContent = `trace: ${ip} · failed`;
      document.getElementById('trace-status').classList.add('visible');
    }
  }, 2000);
}

async function startTrace(ip) {
  clearTrace();
  document.getElementById('trace-msg').textContent = `tracing ${ip}…`;
  document.getElementById('trace-status').classList.add('visible');

  const r    = await fetch(`/api/traceroute/${ip}`, { method: 'POST' });
  const data = await r.json();

  if (data.status === 'cached') {
    const res = await fetch(`/api/traceroute/${ip}`);
    const cached = await res.json();
    if (cached.hops) drawTrace(ip, cached.hops);
  } else {
    pollTrace(ip);
  }
}

document.getElementById('clear-trace-btn').addEventListener('click', clearTrace);

// ── History panel ─────────────────────────────────────────────────────────────

async function openHistory(ip) {
  const panel = document.getElementById('history-panel');
  document.getElementById('history-ip').textContent = ip;
  document.getElementById('history-meta').textContent = 'loading…';
  document.getElementById('history-footer').textContent = '';
  panel.classList.add('open');

  let data;
  try {
    const r = await fetch(`/api/history/${ip}`);
    data = await r.json();
  } catch(e) {
    document.getElementById('history-meta').textContent = 'failed to load';
    return;
  }

  const events   = data.events || [];
  const firstTs  = data.first_seen;
  const firstDate = firstTs ? new Date(firstTs * 1000).toLocaleDateString() : '?';
  const ports     = [...new Set(events.map(e => e.port).filter(Boolean))].slice(0, 3).join(', ');
  document.getElementById('history-meta').textContent =
    `first seen ${firstDate} · ${events.length} events`;
  document.getElementById('history-footer').textContent =
    `ports: ${ports || '?'}`;

  // Draw sparkline — 24 hourly buckets
  const canvas = document.getElementById('history-canvas');
  const ctx    = canvas.getContext('2d');
  const W      = canvas.offsetWidth  || 272;
  const H      = canvas.offsetHeight || 56;
  canvas.width  = W * devicePixelRatio;
  canvas.height = H * devicePixelRatio;
  ctx.scale(devicePixelRatio, devicePixelRatio);

  const now    = Date.now() / 1000;
  const buckets = new Array(24).fill(0);
  events.forEach(e => {
    const hoursAgo = (now - e.seen_at) / 3600;
    if (hoursAgo < 24) {
      const idx = Math.min(23, Math.floor(hoursAgo));
      buckets[23 - idx]++;
    }
  });

  const maxVal = Math.max(...buckets, 1);
  const barW   = W / 24;
  const gap    = 1;

  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#0d1117';
  ctx.fillRect(0, 0, W, H);

  buckets.forEach((val, i) => {
    const barH = Math.max(2, (val / maxVal) * (H - 4));
    const x    = i * barW + gap;
    const y    = H - barH;
    const alpha = 0.3 + 0.7 * (val / maxVal);
    ctx.fillStyle = `rgba(88,166,255,${alpha})`;
    ctx.fillRect(x, y, barW - gap * 2, barH);
  });
}

document.getElementById('history-close').addEventListener('click', () => {
  document.getElementById('history-panel').classList.remove('open');
});

// ── Popup content ─────────────────────────────────────────────────────────────

function popupHtml(c) {
  const lvl   = threatLevel(c.abuse_score);
  const tline = lvl
    ? `<br><span style="color:${lvl==='high'?'#f85149':lvl==='med'?'#f0883e':'#e3b341'}">
       ${lvl==='high'?'☠':'⚠'} AbuseIPDB: ${c.abuse_score}/100 (${c.threat_reports} reports)</span>`
    : '';
  return `<b>${c.ip}</b><br>
    <span style="color:#8b949e">:${c.port}</span><br>
    ${c.city ? c.city + ', ' : ''}${c.country || '?'}<br>
    ${c.org || c.isp || ''}
    ${c.process ? '<br><span style="color:#3fb950">⚙ ' + c.process + '</span>' : ''}
    ${tline}
    <button class="trace-btn" onclick="startTrace('${c.ip}')">trace route</button>`;
}

// ── Main refresh loop ─────────────────────────────────────────────────────────

async function refresh() {
  let data;
  try {
    const r = await fetch('/api/connections');
    data = await r.json();
  } catch(e) { return; }

  lastData = data;
  document.getElementById('threat-legend').classList.toggle('visible', !!data.threat_enabled);

  if (data.host && data.host.lat && !hostMarker) {
    hostLatLng = [data.host.lat, data.host.lon];
    hostMarker = L.marker(hostLatLng, { icon: hostIcon, zIndexOffset: 1000 })
      .addTo(map)
      .bindPopup(`<b>YOU</b><br>${data.host.query}<br>${data.host.city}, ${data.host.country}`);
    document.getElementById('host-info').innerHTML =
      `<span class="label">HOST</span> &mdash; ${data.host.query} &mdash; ${data.host.city}, ${data.host.country}`;
  }

  Object.values(arcMap).forEach(({ line }) => map.removeLayer(line));
  arcMap = {};

  const list = document.getElementById('conn-list');
  list.innerHTML = '';
  rowMap = {};

  const seen = new Set();

  data.connections.forEach(c => {
    seen.add(c.ip);
    const score = c.abuse_score ?? null;
    const lvl   = threatLevel(score);
    const color = markerColor(c.process, score);

    const icon = peerIcon(color, lvl);
    if (!peerMarkers[c.ip]) {
      peerMarkers[c.ip] = L.marker([c.lat, c.lon], { icon }).addTo(map);
    } else {
      peerMarkers[c.ip].setIcon(icon);
    }
    peerMarkers[c.ip].bindPopup(popupHtml(c));

    if (hostLatLng) {
      const arcColor = lvl === 'high' ? '#f85149' : lvl === 'med' ? '#f0883e' : color;
      const arcOp    = lvl === 'high' ? 0.7 : 0.45;
      const line     = L.polyline(gcArc(hostLatLng, [c.lat, c.lon]),
        { color: arcColor, weight: lvl === 'high' ? 1.6 : 1.2, opacity: arcOp,
          dashArray: lvl === 'high' ? '6,3' : '5,5' }).addTo(map);
      arcMap[c.ip] = { line, c };
    }

    // Sidebar row
    const row = document.createElement('div');
    row.className = 'conn' + (lvl ? ` threat-${lvl}` : '');

    const body = document.createElement('div');
    body.className = 'conn-body';
    body.innerHTML = `
      <div class="ip" style="color:${color}">${c.ip}<span style="color:#484f58">:${c.port}</span></div>
      <div class="loc">${c.city ? c.city + ', ' : ''}${c.country || '?'} (${c.countryCode || '?'})</div>
      ${c.process ? `<div class="proc">⚙ ${c.process}</div>` : ''}
      ${c.org ? `<div class="org">🏢 ${c.org}</div>` : ''}
      ${score !== null ? `<div>${threatLabel(score, c.threat_reports ?? 0)}</div>` : ''}
    `;

    const hbtn = document.createElement('button');
    hbtn.className = 'history-btn';
    hbtn.title = 'Connection history';
    hbtn.textContent = '⏱';
    hbtn.addEventListener('click', e => { e.stopPropagation(); openHistory(c.ip); });

    row.appendChild(body);
    row.appendChild(hbtn);
    row.addEventListener('click', () => { map.setView([c.lat, c.lon], 5); peerMarkers[c.ip].openPopup(); });

    rowMap[c.ip + ':' + c.port] = row;
    list.appendChild(row);
  });

  Object.keys(peerMarkers).forEach(ip => {
    if (!seen.has(ip)) { map.removeLayer(peerMarkers[ip]); delete peerMarkers[ip]; }
  });

  renderChips(data.connections, data.threat_enabled);
  applyFilter(data.connections);

  const t = new Date(data.last_updated * 1000);
  const total = data.connections.length;
  document.getElementById('stats').textContent =
    `${total} connection${total !== 1 ? 's' : ''} · ${t.toLocaleTimeString()}`;
}

// ── Event listeners ───────────────────────────────────────────────────────────

document.getElementById('search-input').addEventListener('input', e => {
  searchText = e.target.value;
  updateClearBtn();
  if (lastData) applyFilter(lastData.connections);
});
document.getElementById('clear-btn').addEventListener('click', clearAll);

// ── Boot ──────────────────────────────────────────────────────────────────────

refresh();
setInterval(refresh, 5000);
</script>
</body>
</html>
